<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>RISO 油墨組合參考</title>
    <link rel="stylesheet" href="main.css">
    <script src="main.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Noto+Sans+TC:wght@100..900&display=swap">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>

    <div class="card">
        <h1>RISO 油墨組合參考 (V2.4)</h1>
        
        <div class="section-divider">
            <div class="library-layout">
                <div class="library-main">
                    <div class="ink-section">
                        <h3 class="ink-section-title active-title">● 使用中的油墨</h3>
                        <div class="ink-library-grid" id="active-inks-display"></div>
                    </div>
                    
                    <div class="add-ink-form">
                        <strong id="form-title" class="nowrap-text">新增油墨：</strong>
                        <input type="color" id="form-ink-color" value="#000000" class="ink-color-picker">
                        <input type="text" id="form-ink-name" placeholder="輸入自訂油墨名稱">
                        <button id="form-btn-submit" onclick="submitInkForm()" class="btn-secondary">加入</button>
                        <button id="form-btn-cancel" onclick="cancelEdit()" class="btn-secondary hidden">取消</button>
                    </div>
                </div>

                <div class="library-sidebar">
                    <h3 class="ink-section-title archive-title">○ 油墨倉庫（不使用的油墨）</h3>
                    <div class="archived-list" id="archived-inks-display"></div>
                </div>
            </div>
        </div>

        <h2>目標色彩設定</h2>
        <div class="file-upload-box">
            <div>
                <h3 class="upload-title">從圖片擷取目標色彩</h3>
                <div class="file-upload-wrapper">
                    <button class="btn-secondary"><i class="bi bi-folder2-open"></i> 選擇圖片檔案</button>
                    <input type="file" id="image-upload" accept="image/*">
                </div>
                <span id="file-name-display" class="file-name-text">尚未選擇檔案</span>
            </div>
            <div id="img-preview-container" class="img-preview-box hidden">
                <canvas id="img-canvas" class="preview-canvas"></canvas>
                <button class="primary" id="extract-btn" onclick="extractDominantColors()"><i class="bi bi-magic"></i> 擷取 5 個目標色</button>
            </div>
        </div>
        
        <div class="target-header-row">
            <p class="target-header-text"><i class="bi bi-1-circle-fill"></i> 設定目標色彩</p>
            <div class="target-controls">
                <button onclick="addTargetColor()" id="btn-add-target" class="btn-secondary"><i class="bi bi-plus-lg"></i> 新增色票</button>
            </div>
        </div>
        
        <div class="color-row" id="target-colors">
            </div>

        <p class="target-header-text mt-4"><i class="bi bi-2-circle-fill"></i> 設定希望使用的 Riso 油墨總數</p>
        
        <div class="custom-dropdown limit-width-200 mb-4" id="max-inks-cd">
            <div class="cd-selected" onclick="toggleDropdown('max-inks-panel')">
                <span id="max-inks-text" class="cd-text-grow">3 色</span>
            </div>
            <div class="cd-panel" id="max-inks-panel">
                <div class="cd-options">
                    <div class="cd-option" onclick="selectMaxInks(2, '2 色')"><span>2 色</span></div>
                    <div class="cd-option" onclick="selectMaxInks(3, '3 色')"><span>3 色</span></div>
                    <div class="cd-option" onclick="selectMaxInks(4, '4 色')"><span>4 色</span></div>
                </div>
            </div>
            <input type="hidden" id="max-inks-val" value="3">
        </div>
        
        <br>
        <button class="primary" id="calc-btn" onclick="calculateColors()">
            <i class="bi bi-clipboard-data"></i> 分析 RISO 油墨組合
        </button>
    </div>

    <div class="card hidden" id="result-container">
        <h2>RISO 油墨組合</h2>
        <div id="chosen-inks-container" class="mb-4">
            </div>
        <div id="results"></div>
    </div>
</body>
</html>
